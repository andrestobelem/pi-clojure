services:
  dolt:
    image: dolthub/dolt-sql-server:latest
    ports:
      - "3307:3306"
    environment:
      DOLT_ROOT_PASSWORD: ${DOLT_ROOT_PASSWORD:-doltroot}
      DOLT_ROOT_HOST: "%"
      DOLT_DATABASE: ${DOLT_DATABASE:-chat_markdown}
      DOLT_USER: ${DOLT_USER:-chat}
      DOLT_PASSWORD: ${DOLT_PASSWORD:-chatpass}
      DOLT_USER_HOST: "%"
    volumes:
      - dolt_data:/var/lib/dolt
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "dolt sql -q 'select 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  dolt_data:
